<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="signin.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
    <noscript>Sorry, your browser does not support JavaScript!</noscript>
</head>
<body>
    <div class="signupform">
        <span class="signuptitle">Sign in to </span>
        <span class="highlight">BUFFER</span>
        <div class="signupforminner">
            <input placeholder="Your Email/Username" type="text" id="useremail" autocomplete="off" autocorrect="off">
            <input placeholder="Your Password" type="text" id="pass" autocomplete="off" autocorrect="off">
            <button id="signinbtn"> Sign in</button>
        </div>
        <p class="signupcontent">Or <a href="#">sign-up</a> to BUFFER if you do not have an account.</p>
    </div>
</body>
</html>
