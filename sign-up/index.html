<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="signup.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
    <noscript>Sorry, your browser does not support JavaScript!</noscript>
</head>
<body>
    <div class="signupform">
        <span class="signuptitle">Sign up for </span>
        <span class="highlight">BUFFER</span>
        <div class="signupforminner">
            <input placeholder="Your Email" type="text" id="email" autocomplete="off" autocorrect="off">
            <input placeholder="Your Username" type="text" id="user" autocomplete="off" autocorrect="off">
            <input placeholder="Your Password" type="text" id="pass" autocomplete="off" autocorrect="off">
            <input placeholder="Invite Key" type="text" id="key" autocomplete="off" autocorrect="off">
            <button id="signupbtn"> Sign up</button>
        </div>
        <p class="signupcontent">Or <a href="#">sign-in</a> to BUFFER if you already have an account.</p>
    </div>
</body>
</html>
